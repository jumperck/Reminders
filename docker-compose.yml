services:

  # Apps

  migrations:
    image: reminders-migrations-runner
    container_name: reminders-migrations-runner
    build:
      context: .
      dockerfile: src/server/services/dotnet/Reminders.MigrationsRunner/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - all
      - api
      - mvc

  dotnet-api:
    image: reminders-dotnet-api
    container_name: reminders-dotnet-api
    build: 
      context: src/server/api/dotnet/Reminders.Api
    depends_on:
      migrations:
        condition: service_completed_successfully
      ganache:
        condition: service_started
    profiles: 
      - all
      - api
    deploy: &shared-deploy
      resources:
        limits:
          cpus: '0.25'
          memory: '0.5GB'

  go-api: 
    image: reminders-go-api
    container_name: reminders-go-api
    build: 
      context: src/server/api/go/reminders-api
    depends_on:
      migrations:
        condition: service_completed_successfully
    profiles: 
      - all
      - api
    deploy: *shared-deploy

  cpp-api:
    image: reminders-cpp-api
    container_name: reminders-cpp-api
    build:
      context: src/server/api/cpp/reminders-api
    depends_on:
      migrations:
        condition: service_completed_successfully
    profiles:
      - all
      - api
    deploy: *shared-deploy

  mvc:
    image: reminders-mvc
    container_name: reminders-mvc
    build:
      context: .
      dockerfile: src/app/dotnet/Reminders.Mvc/Dockerfile
    depends_on:
      - nginx
    profiles:
      - all
      - mvc
    deploy: *shared-deploy

  react:
    image: reminders-react
    container_name: reminders-react
    build:
      context: .
      dockerfile: src/app/reactjs/reminders-app/Dockerfile
    depends_on:
      - nginx
    profiles:
      - all
    deploy: *shared-deploy

  # Database

  mssql:
    image: "mcr.microsoft.com/mssql/server"
    container_name: reminders-mssql
    profiles:
      - all-old
      # - api
      # - mvc

  postgres:
    image: postgres
    container_name: reminders-postgres
    profiles:
      - all
      - api
      - mvc
    deploy: *shared-deploy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-Reminders} -h 127.0.0.1 -p 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Load Balancer

  nginx: 
    image: nginx:latest
    container_name: reminders-nginx
    depends_on:
      - dotnet-api
      - go-api
      - cpp-api
    profiles:
      - all
      - api
    deploy: *shared-deploy
    ports:
      - "9999:9999"
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro

  # Blockchain
  ganache:
    image: trufflesuite/ganache
    container_name: reminders-blockchain
    ports:
      - "8545:8545"
    command:
      - --accounts=10
      - --defaultBalanceEther=1000
      - --mnemonic="candy maple cake sugar pudding cream honey rich smooth crumble sweet treat"
    restart: unless-stopped

  # blockscout:
